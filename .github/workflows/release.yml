name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-macos:
    name: Build & Release (macOS arm64)
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & package
        run: bun release
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}

      - name: Resolve version tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Create the tag locally if it doesn't exist (e.g. manual dispatch)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            git tag "${TAG}"
            git push origin "refs/tags/${TAG}"
          else
            echo "Tag ${TAG} already exists, skipping creation"
            git push origin "refs/tags/${TAG}" || echo "Tag already on remote"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/Oursum-beta-*.dmg
