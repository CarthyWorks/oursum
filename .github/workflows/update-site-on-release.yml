
name: Update Oursum site on release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  release:
    types: [published]

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Find .dmg asset URL
        id: find_dmg
        run: |
          DMG_URL=$(gh release view "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --json assets \
            --jq '[.assets[] | select(.name | endswith(".dmg")) | .url][0] // ""')
          echo "dmg_url=${DMG_URL}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout site repository
        uses: actions/checkout@v4
        with:
          repository: CarthyWorks/oursum-site
          path: site
          token: ${{ secrets.SITE_REPO_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Update site files
        run: |
          node .github/scripts/update-site.js site "${{ github.event.release.tag_name }}" "${{ steps.find_dmg.outputs.dmg_url }}"

      - name: Commit and push changes
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html || true
          git commit -m "chore(site): update download link and version for release ${{ github.event.release.tag_name }}" || echo "no changes to commit"
          git push origin HEAD:main
        env:
          GIT_TERMINAL_PROMPT: '0'
